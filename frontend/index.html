<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart City Report — AI Grievance System</title>
  <meta name="description" content="Report civic issues instantly. AI-powered grievance classification and tracking for smart cities." />
  <link rel="stylesheet" href="./style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background:#030712;">

  <!-- Animated background -->
  <div class="mesh-bg"><div class="mesh-blob3"></div></div>
  <div class="grid-overlay"></div>

  <!-- Main card -->
  <div class="relative z-10 w-full max-w-md fade-up">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
           style="background: linear-gradient(135deg,#6366f1,#3b82f6); box-shadow: 0 8px 32px rgba(99,102,241,0.4);">
        <svg width="32" height="32" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight">Smart City Report</h1>
      <p class="text-sm mt-1" style="color:rgba(255,255,255,0.45)">AI-Powered Citizen Grievance System</p>
    </div>

    <!-- Glass card -->
    <div class="glass p-8">

      <!-- Tab switcher -->
      <div class="flex gap-1 p-1 rounded-xl mb-7" style="background:rgba(255,255,255,0.06);">
        <button id="btn-user" class="tab-pill active" onclick="switchTab('user')">
          👤 Citizen
        </button>
        <button id="btn-dept" class="tab-pill" onclick="switchTab('dept')">
          🏛️ Department
        </button>
      </div>

      <!-- ─── Citizen: Login Form ──────────────────────────────────── -->
      <form id="user-login-form" class="space-y-4">

        <!-- Email field -->
        <div id="login-email-field">
          <label class="form-label" style="color:rgba(255,255,255,0.75);">Email address</label>
          <input type="email" id="login-email" placeholder="Email"
            class="form-input" required />
        </div>

        <div>
          <label class="form-label" style="color:rgba(255,255,255,0.75);">Password</label>
          <div style="position:relative;display:flex;align-items:center;">
            <input type="password" id="login-password" placeholder="••••••••"
              class="form-input" required style="padding-right:3rem;width:100%;" />
            <button type="button" id="toggle-login-password"
              style="position:absolute;right:.5rem;display:flex;align-items:center;gap:.25rem;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);border-radius:.4rem;cursor:pointer;color:#818cf8;padding:.25rem .5rem;font-size:.7rem;font-weight:600;transition:background .2s;">
              <svg id="eye-login-show" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eye-login-hide" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
              <span id="eye-login-label">Show</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary mt-2">
          <span>Sign In</span>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M6 12h12"/>
          </svg>
        </button>

        <p class="text-center text-sm" style="color:rgba(255,255,255,0.4);">
          No account?
          <a href="#" id="show-register"
            class="font-semibold hover:underline" style="color:#818cf8;">Create one</a>
        </p>
      </form>

      <!-- ─── Citizen: Register Form ──────────────────────────────── -->
      <form id="user-register-form" class="space-y-4 hidden">
        <div>
          <label class="form-label" style="color:rgba(255,255,255,0.75);">Full Name</label>
          <input type="text" id="register-name" placeholder="Name"
            class="form-input" required />
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="form-label" style="color:rgba(255,255,255,0.75);">Phone</label>
            <input type="tel" id="register-phone" placeholder="Mobile No."
              class="form-input" required />
          </div>
          <div>
            <label class="form-label" style="color:rgba(255,255,255,0.75);">Age</label>
            <input type="number" id="register-age" placeholder="Age" min="1"
              class="form-input" required />
          </div>
        </div>

        <div>
          <label class="form-label" style="color:rgba(255,255,255,0.75);">Gender</label>
          <select id="register-gender" class="form-input" required>
            <option value="" disabled selected>Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div>
          <label class="form-label" style="color:rgba(255,255,255,0.75);">Email address</label>
          <input type="email" id="register-email" placeholder="Email"
            class="form-input" required />
        </div>

        <div>
          <label class="form-label" style="color:rgba(255,255,255,0.75);">Password</label>
          <div style="position:relative;display:flex;align-items:center;">
            <input type="password" id="register-password" placeholder="Min. 6 characters"
              class="form-input" required style="padding-right:3rem;width:100%;" />
            <button type="button" id="toggle-register-password"
              style="position:absolute;right:.5rem;display:flex;align-items:center;gap:.25rem;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);border-radius:.4rem;cursor:pointer;color:#818cf8;padding:.25rem .5rem;font-size:.7rem;font-weight:600;transition:background .2s;">
              <svg id="eye-register-show" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eye-register-hide" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
              <span id="eye-register-label">Show</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary mt-2">
          <span>Create Account</span>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </button>

        <p class="text-center text-sm" style="color:rgba(255,255,255,0.4);">
          Already registered?
          <a href="#" id="show-login"
            class="font-semibold hover:underline" style="color:#818cf8;">Sign in</a>
        </p>
      </form>

      <!-- ─── Department Login Form ────────────────────────────────── -->
      <form id="dept-login-form" class="space-y-4 hidden">
        <div class="flex items-center gap-3 p-3 rounded-xl mb-2"
             style="background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2);">
          <svg width="18" height="18" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 110 20A10 10 0 0112 2z"/>
          </svg>
          <p class="text-xs" style="color:rgba(255,255,255,0.5);">
            For government department officials only
          </p>
        </div>

        <div>
          <label class="form-label" style="color:rgba(255,255,255,0.75);">Department</label>
          <select id="dept-login-email" class="form-input" required>
            <option value="" disabled selected>Loading departments…</option>
          </select>
        </div>
        <div>
          <label class="form-label" style="color:rgba(255,255,255,0.75);">Password</label>
          <div style="position:relative;display:flex;align-items:center;">
            <input type="password" id="dept-password" placeholder="••••••••"
              class="form-input" required style="padding-right:3rem;width:100%;" />
            <button type="button" id="toggle-dept-password"
              style="position:absolute;right:.5rem;display:flex;align-items:center;gap:.25rem;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:.4rem;cursor:pointer;color:#34d399;padding:.25rem .5rem;font-size:.7rem;font-weight:600;transition:background .2s;">
              <svg id="eye-dept-show" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eye-dept-hide" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
              <span id="eye-dept-label">Show</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-secondary mt-2">
          <span>Department Sign In</span>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </button>
      </form>

    </div><!-- /glass card -->

    <!-- Footer -->
    <p class="text-center text-xs mt-6" style="color:rgba(255,255,255,0.2);">
      © 2026 Smart City Report · Powered by AI
    </p>
  </div>

  <script>
    function switchTab(tab) {
      const btnUser = document.getElementById('btn-user');
      const btnDept = document.getElementById('btn-dept');
      const loginForm = document.getElementById('user-login-form');
      const registerForm = document.getElementById('user-register-form');
      const deptForm = document.getElementById('dept-login-form');

      if (tab === 'user') {
        btnUser.classList.add('active'); btnUser.classList.remove('active-green');
        btnDept.classList.remove('active', 'active-green');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        deptForm.classList.add('hidden');
      } else {
        btnDept.classList.add('active-green'); btnDept.classList.remove('active');
        btnUser.classList.remove('active', 'active-green');
        deptForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        registerForm.classList.add('hidden');
        // Reload departments every time this tab is opened
        if (typeof window._loadDepartments === 'function') window._loadDepartments();
      }
    }

    /* ── Show / hide password toggle ── */
    function togglePassword(inputId, showSvgId, hideSvgId) {
      const inp = document.getElementById(inputId);
      const eyeShow = document.getElementById(showSvgId);
      const eyeHide = document.getElementById(hideSvgId);
      if (!inp) return;
      if (inp.type === 'password') {
        inp.type = 'text';
        if (eyeShow) eyeShow.style.display = 'none';
        if (eyeHide) eyeHide.style.display = 'block';
      } else {
        inp.type = 'password';
        if (eyeShow) eyeShow.style.display = 'block';
        if (eyeHide) eyeHide.style.display = 'none';
      }
    }

    document.getElementById('toggle-login-password')?.addEventListener('click', function() {
      togglePassword('login-password', 'eye-login-show', 'eye-login-hide');
      const lbl = document.getElementById('eye-login-label');
      if (lbl) lbl.textContent = document.getElementById('login-password').type === 'text' ? 'Hide' : 'Show';
    });
    document.getElementById('toggle-register-password')?.addEventListener('click', function() {
      togglePassword('register-password', 'eye-register-show', 'eye-register-hide');
      const lbl = document.getElementById('eye-register-label');
      if (lbl) lbl.textContent = document.getElementById('register-password').type === 'text' ? 'Hide' : 'Show';
    });
    document.getElementById('toggle-dept-password')?.addEventListener('click', function() {
      togglePassword('dept-password', 'eye-dept-show', 'eye-dept-hide');
      const lbl = document.getElementById('eye-dept-label');
      if (lbl) lbl.textContent = document.getElementById('dept-password').type === 'text' ? 'Hide' : 'Show';
    });

    window.togglePassword = togglePassword;

  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
